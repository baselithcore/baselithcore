app:
  # PUBLIC, browser-reachable origin — MUST equal backend.baseUrl (the
  # app-backend plugin serves the UI and the API from one origin). Behind a
  # TLS-terminating reverse proxy set BOTH APP_BASE_URL and BACKEND_BASE_URL to
  # the proxy's HTTPS URL, e.g. https://portal.example.com. Env-driven (not
  # hardcoded) so it is NOT pinned to localhost: a hardcoded value here silently
  # overrode APP_BASE_URL, baking localhost into the app bundle → any OAuth
  # sign-in popup posts back to the wrong origin and login fails behind a proxy.
  # Baked into the bundle at build AND read by the backend at runtime → rebuild
  # the app after changing it.
  baseUrl: ${APP_BASE_URL:-http://localhost:7007}

backend:
  # The URL the browser uses to reach the backend — behind a proxy this is the
  # public HTTPS URL, NOT localhost. Backstage derives auth cookie
  # `Secure`/`SameSite` flags and OAuth `redirect_uri` from this value, so a
  # stale http/localhost here breaks the cookie (blocked over HTTPS) and the
  # redirect. Keep it identical to app.baseUrl (single origin).
  baseUrl: ${BACKEND_BASE_URL:-http://localhost:7007}
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: ':7007'

  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt

proxy:
  endpoints:
    '/baselith-api':
      target: ${BASELITH_BASE_URL}
      headers:
        Authorization: 'ApiKey ${BASELITH_API_KEY}'

baselith:
  # Base URL of the running BaselithCore instance (server-side, bypasses the proxy).
  baseUrl: ${BASELITH_BASE_URL}
  # Must match the admin/job API key configured in BaselithCore.
  apiKey: ${BASELITH_API_KEY}

auth:
  providers:
    guest: {}

catalog:
  # The BaselithCoreEntityProvider ingests the live plugin ecosystem; no
  # static example data in production.
  locations: []
