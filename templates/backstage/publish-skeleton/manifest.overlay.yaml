# Overlay patched into the plugin's existing manifest.yaml by a pre-publish
# step. The scaffolder copies the plugin source verbatim; the GitHub Action
# (or a local `baselith plugin manifest merge` call) merges this overlay to
# ensure the required marketplace fields are present before the ZIP is
# uploaded.
#
# Merge semantics: top-level scalars overwrite, lists and maps are deep-merged.
id: {{ values.pluginName }}
name: {{ values.pluginName }}
version: {{ values.version }}
description: {{ values.entryDescription }}
author: {{ values.author }}
entry_point: {{ values.entryPoint }}
repository: https://github.com/{{ values.repoOwner }}/{{ values.repoName }}
license: {{ values.license }}
readiness: {{ values.readiness }}
min_core_version: "2.0.0"
