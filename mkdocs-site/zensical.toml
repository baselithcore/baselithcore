# ──────────────────────────────────────────────
# Theme — "classic" keeps the Material for MkDocs look
# ──────────────────────────────────────────────
[project.theme]
variant  = "classic"
logo     = "public/solo-logo-white.png"
language = "en"
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
  "search.suggest",
  "search.highlight",
  "search.share",
  "content.tabs.link",
  "content.code.copy",
  "content.code.annotate",
  "content.tooltips",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"
logo = "material/robot-outline"

# Light mode
[[project.theme.palette]]
media   = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "teal"
accent  = "cyan"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

# Dark mode (default)
[[project.theme.palette]]
media   = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "teal"
accent  = "cyan"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

# ──────────────────────────────────────────────
# Social links
# ──────────────────────────────────────────────
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/baselithcore/baselithcore"
