---
# Prometheus Configuration
# Scrape configs for baselith-core observability

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Baselith-Core-System Backend
  # Assumes backend exposes /metrics endpoint
  - job_name: 'baselith-core'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s
