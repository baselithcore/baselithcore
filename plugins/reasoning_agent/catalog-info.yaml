apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reasoning-agent
  title: Reasoning Agent
  description: High-performance Reasoning agent with MCTS and Tree of Thoughts
  annotations:
    backstage.io/techdocs-ref: dir:.
    baselith.ai/plugin-api-url: http://localhost:8000/api/plugins/reasoning_agent
    baselith.ai/health-url: http://localhost:8000/health
    baselith.ai/category: agent
    app.kubernetes.io/version: '1.2.0'
  labels:
    baselith.ai/readiness: stable
    baselith.ai/pattern-reasoning: "true"
    baselith.ai/pattern-reflection: "true"
  links:
    - url: https://baselithcore.xyz
      title: BaselithCore Website
      icon: web
  tags:
    - agent
    - reasoning
    - mcts
    - tot
spec:
  type: service
  lifecycle: production
  owner: group:default/guests
  system: baselithcore
