apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: baselithcore
  title: BaselithCore
  description: The BaselithCore multi-agent, plugin-first AI framework
  links:
    - url: https://baselithcore.xyz
      title: Website
      icon: web
spec:
  owner: group:default/guests
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-plugin
  title: Example Plugin
  description: Example plugin demonstrating the BaselithCore plugin system
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://baselithcore.xyz
    baselith.ai/plugin-api-url: http://localhost:8000/api/plugins/example-plugin
    baselith.ai/health-url: http://localhost:8000/health
    baselith.ai/category: generic
    app.kubernetes.io/version: '0.1.0'
  labels:
    baselith.ai/readiness: stable
  links:
    - url: https://baselithcore.xyz
      title: BaselithCore Website
      icon: web
    - url: https://baselithcore.xyz/plugins/example-plugin
      title: Plugin Documentation
      icon: docs
  tags:
    - example
    - template
    - baselithcore-plugin
spec:
  type: service
  lifecycle: experimental
  owner: group:default/guests
  system: baselithcore
