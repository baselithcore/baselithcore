<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baselith-Core · Console</title>
    <link rel="icon" type="image/svg+xml" href="/static/frontend/favicon.svg" />
    <link rel="stylesheet" href="/static/frontend/console.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">◢◣</span>
          <span class="brand-name">Baselith-Core</span>
          <span class="brand-sub">Console</span>
        </div>
        <div class="topbar-right">
          <span id="health-badge" class="badge badge-unknown" title="Backend health"
            >● checking…</span
          >
          <a class="link" href="/docs" target="_blank" rel="noopener">API Docs ↗</a>
        </div>
      </header>

      <main class="layout">
        <section class="panel chat-panel">
          <div class="panel-head">
            <h2>Chat</h2>
            <button id="new-convo" class="btn-ghost" title="Start a new conversation">New</button>
          </div>
          <div id="messages" class="messages">
            <div class="empty-state">
              <p>Ask the agent something to get started.</p>
              <p class="hint">Set your API key in the sidebar if requests return 401.</p>
            </div>
          </div>
          <form id="chat-form" class="composer">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Type a message…  (Enter to send, Shift+Enter for newline)"
              autocomplete="off"
            ></textarea>
            <button id="send-btn" type="submit" class="btn-primary">Send</button>
          </form>
        </section>

        <aside class="panel side-panel">
          <div class="panel-head"><h2>Connection</h2></div>
          <label class="field">
            <span>API key</span>
            <input
              id="api-key"
              type="password"
              placeholder="X-API-Key (optional)"
              autocomplete="off"
            />
          </label>
          <div class="row">
            <button id="save-key" class="btn-secondary">Save key</button>
            <button id="clear-key" class="btn-ghost">Clear</button>
          </div>
          <p id="key-status" class="muted small"></p>

          <div class="panel-head"><h2>System</h2></div>
          <div id="system-info" class="kv">
            <div class="muted small">Loading status…</div>
          </div>
          <button id="refresh-status" class="btn-ghost full">Refresh</button>
        </aside>
      </main>
    </div>
    <script src="/static/frontend/console.js" defer></script>
  </body>
</html>
