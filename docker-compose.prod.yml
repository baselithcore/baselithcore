
services:
  # Main service: API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile-slim
    container_name: baselith-core-api
    env_file: configs/.env.production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - CORE_LOG_FORMAT=json
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql://baselithcore:baselithcore@postgres:5432/baselithcore}
      - REDIS_URL=${REDIS_URL:-redis://falkordb:6379/0}
      - DOCKER_HOST=tcp://sandbox-daemon:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - sandbox_certs:/certs/client:ro
      - ./data:/app/data
    depends_on:
      - falkordb
      - postgres
      - sandbox-daemon
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cache and Message Queue
  # Graph Database and Cache (Redis compatible)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: baselith-falkordb
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Relational Database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-baselithcore}
      - POSTGRES_USER=${DB_USER:-baselithcore}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-baselithcore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d ${DB_NAME:-baselithcore} -U ${DB_USER:-baselithcore}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker for Async Tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile-slim
    container_name: baselith-core-worker
    env_file: configs/.env.production
    command: python -m core.task_queue.worker
    environment:
      - ENVIRONMENT=production
      - CORE_LOG_FORMAT=json
      - DATABASE_URL=${DATABASE_URL:-postgresql://baselithcore:baselithcore@postgres:5432/baselithcore}
      - REDIS_URL=${REDIS_URL:-redis://falkordb:6379/0}
      - DOCKER_HOST=tcp://sandbox-daemon:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - sandbox_certs:/certs/client:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G

  # Secure Sandbox Daemon (Docker-in-Docker)
  sandbox-daemon:
    image: docker:24-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - sandbox_certs:/certs
      - sandbox_data:/var/lib/docker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: baselith-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # === Observability Stack ===
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: baselith-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: baselith-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

volumes:
  falkordb_data:
  postgres_data:
  sandbox_certs:
  sandbox_data:
  prometheus_data:
