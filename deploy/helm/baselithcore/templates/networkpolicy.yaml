{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "baselithcore.fullname" . }}
  labels:
    {{- include "baselithcore.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "baselithcore.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from pods in the same namespace (e.g. ingress controller
    # deployed in-namespace) and from the API server for probes.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
{{- end }}
