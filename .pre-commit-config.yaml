---
repos:
  # -----------------------------------------
  # 🐍 Ruff (lint + fix + formatter)
  # -----------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: ['--fix']
        exclude: ^(templates|examples)/
      - id: ruff-format
        exclude: ^(templates|examples)/

  # -----------------------------------------
  # 🔒 Bandit (security linting)
  # -----------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ['-r', '-ll', '--skip', 'B101']
        exclude: ^(templates|examples|tests)/

  # -----------------------------------------
  # 🛠️ Built-in hooks
  # -----------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        exclude: ^(\.gitlab-ci\.yml|mkdocs-site/mkdocs\.yml)$
      - id: check-json
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']

  # -----------------------------------------
  # 📄 Markdownlint CLI2 (lint + fix)
  # -----------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.19.1
    hooks:
      # Lint markdown (solo file che vogliamo veramente processare)
      - id: markdownlint-cli2
        exclude: ^(docs/technical_guide\.md|docs/chat_agent\.md)$
        files: ^(?!\.serena/|CHANGELOG\.md$).+\.md$
        args: ['--config=.markdownlint.yaml']

      # Lint + FIX
      - id: markdownlint-cli2
        name: markdownlint-cli2-fix
        exclude: ^(docs/technical_guide\.md|docs/chat_agent\.md)$
        files: ^(?!\.serena/|CHANGELOG\.md$).+\.md$
        args: ['--fix', '--config=.markdownlint.yaml']

  # -----------------------------------------
  # 🎨 Prettier (formatting React/Vite)
  # -----------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier-react
        files: \.(js|jsx|ts|tsx|json|css|scss|html)$
        args: ['--write']

  # -----------------------------------------
  # 🔍 MyPy (type checking)
  # -----------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-error-summary']
        files: ^core/
        exclude: ^(templates|examples|tests|frontend|plugins|scripts)/
        additional_dependencies: [types-redis, types-requests, pydantic, pydantic-settings]
