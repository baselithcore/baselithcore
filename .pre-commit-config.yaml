---
repos:
  # -----------------------------------------
  # 🐍 Ruff (lint + fix + formatter)
  # -----------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: ['--fix']
        exclude: ^(templates|examples|backstage-portal)/
      - id: ruff-format
        exclude: ^(templates|examples|backstage-portal)/

  # -----------------------------------------
  # 🔒 Bandit (security linting)
  # -----------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ['-r', '-ll', '--skip', 'B101']
        exclude: ^(templates|examples|tests|backstage-portal)/

  # -----------------------------------------
  # 🛠️ Built-in hooks
  # -----------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: ^(\.gitlab-ci\.yml|mkdocs-site/mkdocs\.yml|backstage-portal/.*\.yaml)$
      - id: check-json
        exclude: ^backstage-portal/
      - id: end-of-file-fixer
        exclude: ^backstage-portal/
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: ^backstage-portal/

  - repo: local
    hooks:
      - id: architecture-boundaries
        name: architecture-boundaries
        entry: python scripts/check_architecture_boundaries.py
        language: system
        pass_filenames: false
      - id: official-plugin-typing
        name: official-plugin-typing
        entry: python scripts/check_official_plugin_typing.py
        language: system
        pass_filenames: false
      - id: core-resilience-typing
        name: core-resilience-typing
        entry: python scripts/check_core_resilience_typing.py
        language: system
        pass_filenames: false
      # Auto-rehash any plugin whose .py/.pyi files are staged. Runs BEFORE
      # plugin-integrity so the drift check sees a coherent manifest.
      - id: sign-changed-plugins
        name: sign-changed-plugins
        entry: python scripts/sign_changed_plugins.py
        language: system
        pass_filenames: false
        files: ^plugins/.*\.(py|pyi)$
        stages: [pre-commit]
      - id: plugin-integrity
        name: plugin-integrity
        entry: python scripts/check_plugin_integrity.py
        language: system
        pass_filenames: false
        files: ^plugins/.*\.(py|pyi|yaml|yml|json)$

  # -----------------------------------------
  # 📄 Markdownlint CLI2 (lint + fix)
  # -----------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.19.1
    hooks:
      # Lint markdown (solo file che vogliamo veramente processare)
      - id: markdownlint-cli2
        exclude: ^(docs/technical_guide\.md|docs/chat_agent\.md|backstage-portal/.*)$
        files: ^(?!\.serena/|CHANGELOG\.md$).+\.md$
        args: ['--config=.markdownlint.yaml']

      # Lint + FIX
      - id: markdownlint-cli2
        name: markdownlint-cli2-fix
        exclude: ^(docs/technical_guide\.md|docs/chat_agent\.md|backstage-portal/.*)$
        files: ^(?!\.serena/|CHANGELOG\.md$).+\.md$
        args: ['--fix', '--config=.markdownlint.yaml']

  # -----------------------------------------
  # 🎨 Prettier (formatting React/Vite)
  # -----------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier-react
        files: \.(js|jsx|ts|tsx|json|css|scss|html)$
        exclude: ^backstage-portal/
        args: ['--write']

  # -----------------------------------------
  # 🔍 MyPy (type checking)
  # -----------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-error-summary']
        files: ^core/
        exclude: ^(templates|examples|tests|frontend|plugins|scripts|backstage-portal)/
        additional_dependencies: [types-redis, types-requests, pydantic, pydantic-settings]
