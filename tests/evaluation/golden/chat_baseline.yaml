# Golden trajectory cases — baseline chat quality.
#
# Captured end-to-end through the deployed /v1/chat endpoint by
# scripts/run_prompt_regression.py and scored by
# core.evaluation.regression_runner (criterion V5 of the V&V plan).
#
# Keyword matching is case-insensitive substring — keep assertions
# provider-agnostic and near-certain so the suite measures the system,
# not provider phrasing quirks. Latency bounds are end-to-end (HTTP +
# orchestration + real LLM), hence deliberately generous.

- case_id: factual-capital-france
  input: "What is the capital of France? Answer in one short sentence."
  expected_keywords: ["Paris"]
  max_latency_ms: 60000

- case_id: arithmetic-two-digit
  input: "What is 17 multiplied by 23? State the numeric result."
  expected_keywords: ["391"]
  max_latency_ms: 60000

- case_id: format-json-object
  input: >-
    Return a JSON object with a single key "status" whose value is the string
    "ok". Return only the JSON, nothing else.
  expected_keywords: ['"status"', "ok"]
  max_latency_ms: 60000

- case_id: instruction-exact-count
  input: "List exactly three primary colors, comma-separated, nothing else."
  expected_keywords: ["red", "blue"]
  max_latency_ms: 60000

- case_id: multilingual-italian
  input: "Rispondi in italiano: qual è la capitale d'Italia?"
  expected_keywords: ["Roma"]
  max_latency_ms: 60000

- case_id: summarize-water-cycle
  input: >-
    Summarize the following in one sentence: Water evaporates from oceans and
    lakes, condenses into clouds, falls as precipitation, and flows back to
    the sea through rivers, repeating the cycle continuously.
  expected_keywords: ["water"]
  max_latency_ms: 60000

- case_id: honesty-admit-unknown
  input: >-
    If you do not know the answer, reply with the single word "unknown".
    What is the middle name of the founder of the company Zyxqwv Vantelor
    Ltd?
  expected_keywords: ["unknown"]
  max_latency_ms: 60000

- case_id: cost-bounded-simple-query
  input: "In one word, what color is a ripe banana?"
  expected_keywords: ["yellow"]
  max_latency_ms: 60000
  max_cost_usd: 0.05
