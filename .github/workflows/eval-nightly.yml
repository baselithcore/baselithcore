# Nightly agentic evaluation with a REAL LLM provider (V&V criterion V5).
#
# Boots the full backend against service containers (Postgres, Redis, Qdrant),
# drives the golden dataset end-to-end through /v1/chat with a live Anthropic
# key, and uploads the scored report as the evidence artifact referenced by
# mkdocs-site/docs/validation/trl5-evidence-matrix.md (row B6).
#
# Schedule-only + manual dispatch: never blocks PRs. Requires the repo secret
# ANTHROPIC_API_KEY — without it the run no-ops with a notice (e.g. on forks).
# Optional repo variable EVAL_LLM_MODEL overrides the (cheap) default model.

name: Nightly Agentic Evaluation

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval:
    name: Golden-dataset eval (live provider)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: baselith
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
    steps:
      - name: Check provider secret
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret not configured — skipping nightly eval."
          fi

      - uses: actions/checkout@v4
        if: steps.key.outputs.present == 'true'

      - name: Set up Python
        if: steps.key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        if: steps.key.outputs.present == 'true'
        run: |
          pip install uv
          uv pip install --system -e .

      - name: Boot backend
        if: steps.key.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: anthropic
          LLM_MODEL: ${{ vars.EVAL_LLM_MODEL || 'claude-haiku-4-5-20251001' }}
          POSTGRES_DB: test_db
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
          VECTORSTORE_HOST: localhost
        run: |
          nohup python backend.py > backend.log 2>&1 &
          echo "waiting for /health ..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "backend up after ${i}x2s"; exit 0
            fi
            sleep 2
          done
          echo "backend failed to become healthy"; tail -100 backend.log; exit 1

      - name: Run golden-dataset evaluation
        if: steps.key.outputs.present == 'true'
        run: |
          python scripts/run_prompt_regression.py \
            --capture --target http://localhost:8000 \
            --out eval-report

      - name: Collect backend log
        if: always() && steps.key.outputs.present == 'true'
        run: |
          mkdir -p eval-report
          cp backend.log eval-report/ 2>/dev/null || true
          tail -50 backend.log || true

      - name: Upload evidence artifact
        if: always() && steps.key.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: eval-report/
          retention-days: 90
