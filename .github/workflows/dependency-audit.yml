# Strict weekly dependency audit (V&V evidence row B9).
#
# CI's per-PR pip-audit is advisory (`|| true`) so upstream CVE disclosures
# can't block unrelated work. This scheduled run is the STRICT counterpart:
# it fails loudly when any installed dependency has a known vulnerability,
# giving a dated, auditable signal without gating PRs.

name: Dependency Audit (strict)

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          pip install uv
          uv pip install --system -e . pip-audit
      - name: Audit installed dependencies
        run: |
          pip-audit --skip-editable --format json --output pip-audit.json || AUDIT_FAILED=1
          pip-audit --skip-editable || true   # human-readable copy in the log
          exit "${AUDIT_FAILED:-0}"
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-${{ github.run_id }}
          path: pip-audit.json
          retention-days: 90
