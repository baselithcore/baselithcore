# CodeQL static analysis (SAST) for Python and JavaScript/TypeScript.
# Runs on pushes/PRs to the main branches and weekly to catch newly-disclosed
# query patterns against unchanged code. Results appear under the repository's
# Security → Code scanning tab.
name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          # `security-extended` = the full security query set (incl. lower-severity
          # and lower-precision security queries) WITHOUT the maintainability /
          # quality queries in `security-and-quality`. The quality queries produced
          # a flood of low-value notes against idiomatic code — e.g.
          # `py/ineffectual-statement` on `Protocol` method stubs ending in `...`,
          # `py/cyclic-import`, and `py/non-iterable-in-for-loop` on `str, Enum`
          # iteration (a CodeQL limitation, not a real bug). Keeps the tab focused
          # on actionable security signal.
          queries: security-extended
          # Scope analysis to the shipped product. Tests, examples, templates and
          # the vendored Backstage portal are not part of the attack surface; the
          # portal's JS tree is authored upstream (see the ci.yml Trivy note).
          config: |
            paths-ignore:
              - tests
              - '**/tests/**'
              - examples
              - templates
              - backstage-portal
              - '**/node_modules/**'
              - '**/dist/**'
              - '**/dist-types/**'
            # Two security queries are excluded as reviewed-and-accepted false
            # positives for this codebase's deliberate, documented patterns:
            #
            #   * js/clear-text-storage-of-sensitive-data — the operator console
            #     persists the operator's OWN API key in web storage so the
            #     browser can call the API on their behalf. Every browser store
            #     (local/session) trips this rule; an httpOnly cookie would need a
            #     server-side session the console does not have. Rationale at
            #     core/static/frontend/js/api.js.
            #   * py/weak-sensitive-data-hashing — SHA-256 indexes high-entropy
            #     RANDOM API tokens (not passwords), which are not brute-forceable,
            #     so a slow KDF only adds per-request latency. Rationale at
            #     core/auth/api_keys.py:90-101. NOTE: real passwords in this repo
            #     are hashed with PBKDF2 (core/middleware/security.py), which this
            #     exclusion does not affect.
            query-filters:
              - exclude:
                  id: js/clear-text-storage-of-sensitive-data
              - exclude:
                  id: py/weak-sensitive-data-hashing

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
