name: Release Container Image

# Build, push, sign, and attest the container image. Runs after a GitHub Release
# is published (semantic-release) and can be triggered manually.
on:
  # TEMPORARILY DISABLED — automatic image release on a published GitHub Release
  # is paused. Re-enable by uncommenting the `release` trigger below.
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build (defaults to the release/tag name)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-sign:
    name: Build, push, sign (cosign) + provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR
      id-token: write         # keyless cosign (Sigstore OIDC) + SLSA provenance
      attestations: write     # GitHub artifact attestations
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="${INPUT_TAG:-${RELEASE_TAG:-latest}}"
          # Strip a leading 'v' if present (v0.12.0 -> 0.12.0).
          TAG="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-slim
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          # SLSA provenance + SBOM attached to the image at push time.
          provenance: mode=max
          sbom: true

      - name: Sign image (keyless / Sigstore OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.meta.outputs.image }}
          COSIGN_YES: "true"
        run: |
          cosign sign "${IMAGE}@${DIGEST}"

      - name: Generate GitHub artifact attestation (provenance)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
